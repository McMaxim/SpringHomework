spring:
  application:
    name: "app"

server:
  port: 8080

#  swagger
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

#    actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
        exclude: shutdown
      base-path: "/admin/actuator"
  info:
    env:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      backendACircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      combinedCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

  ratelimiter:
    instances:
      basicRateLimiter:
        registerHealthIndicator: true
        limitForPeriod: 5
        limitRefreshPeriod: 10s
        timeoutDuration: 3s
      customRateLimiter:
        registerHealthIndicator: true
        limitForPeriod: 2
        limitRefreshPeriod: 20s
        timeoutDuration: 3s
      combinedRateLimiter:
        registerHealthIndicator: true
        limitForPeriod: 3
        limitRefreshPeriod: 15s
        timeoutDuration: 5s